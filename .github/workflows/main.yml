name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH with Custom Password
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        echo "✅ SSH configured with password: toor123"
        
    - name: Install Wush (Correct Link)
      run: |
        # Download the correct file with underscore format
        wget -O wush.tar.gz https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_linux_amd64.tar.gz
        tar -xzf wush.tar.gz
        chmod +x wush
        sudo mv wush /usr/local/bin/
        rm wush.tar.gz
        echo "✅ Wush v0.4.1 installed successfully"
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        echo ""
        
        # Start wush in background
        wush serve :22 > wush.log 2>&1 &
        WUSH_PID=$!
        
        echo "⏳ Generating authentication key..."
        sleep 8
        
        # Get the auth key
        echo "📡 WUSH AUTHENTICATION KEY:"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        wush auth show
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        
        echo ""
        echo "======================================================"
        echo "🔑 SSH Password: toor123"
        echo "======================================================"
        echo ""
        echo "📝 INSTRUCTIONS FOR WINDOWS:"
        echo "──────────────────────────────────────"
        echo "1. On Windows, download: curl -LO https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_windows_amd64.exe"
        echo "2. Rename to wush.exe"
        echo "3. Run: .\wush.exe ssh"
        echo "4. Paste the AUTHENTICATION KEY above"
        echo "5. When prompted for password, enter: toor123"
        echo "──────────────────────────────────────"
        
        # Show auth key every 5 minutes for easy copy
        COUNTER=0
        while true; do
          sleep 300
          COUNTER=$((COUNTER + 5))
          echo "[$(date '+%H:%M:%S')] Session active for $COUNTER minutes"
          echo "🔑 Auth key still: $(wush auth show 2>/dev/null | head -1)"
        done
