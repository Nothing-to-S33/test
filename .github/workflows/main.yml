name: BugHunter-Cloudflare
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install Cloudflared & SSH
      run: |
        sudo apt update && sudo apt install -y wget openssh-server
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
    - name: Configure Root Access
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Start Cloudflare Tunnel
      run: |
        # Start tunnel in background with unbuffered output
        stdbuf -oL cloudflared tunnel --url ssh://localhost:22 > cf.log 2>&1 &
        
        # Wait longer and check multiple times for the URL
        echo "⏳ Waiting for tunnel to establish (this takes 15-20 seconds)..."
        
        # Try for up to 30 seconds to get the URL
        for i in {1..30}; do
          sleep 1
          URL=$(grep -o 'https://[-a-zA-Z0-9.]*\.trycloudflare\.com' cf.log | head -n 1)
          if [ ! -z "$URL" ]; then
            break
          fi
        done
        
        # Clear screen for cleaner output
        clear
        
        echo "══════════════════════════════════════════════════"
        echo "         🔥 BUG HUNTER SSH ACCESS 🔥"
        echo "══════════════════════════════════════════════════"
        echo ""
        
        if [ ! -z "$URL" ]; then
          echo "  📡 SSH Command:"
          echo "  ssh -o ProxyCommand=\"cloudflared access ssh --hostname $URL\" root@localhost"
          echo ""
          echo "  🔑 Password: toor123"
          echo ""
          echo "  ⏰ Session expires in: 6 hours"
        else
          echo "  ⚠️  URL not found yet, checking logs..."
          echo ""
          echo "  Latest logs:"
          echo "  ------------"
          tail -n 5 cf.log
          echo ""
          echo "  🔑 Password: toor123"
          echo ""
          echo "  💡 If URL doesn't appear, try: cat cf.log"
        fi
        
        echo "══════════════════════════════════════════════════"
        
        # Keep printing status every minute
        while true; do
          sleep 60
          echo "[$(date '+%H:%M:%S')] Session active - URL: $URL"
        done
