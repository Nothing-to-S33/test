name: BugHunter-Tunnelmole
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install Tunnelmole
      run: |
        curl -O https://tunnelmole.com/downloads/tmole.js && chmod +x tmole.js
        
    - name: Start Tunnelmole
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (Tunnelmole) 🔥"
        echo "======================================================"
        echo ""
        
        # Start tunnel to SSH port
        node tmole.js 22 > tmole.log 2>&1 &
        
        sleep 8
        
        # Get URL
        URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.tunnelmole\.net' tmole.log | head -1)
        
        if [ ! -z "$URL" ]; then
          echo "✅ SSH Command:"
          echo "ssh -p 22 root@$(echo $URL | cut -d/ -f3 | cut -d: -f1) -o StrictHostKeyChecking=no"
          echo ""
          echo "🔑 Password: toor123"
        else
          cat tmole.log
        fi
        
        echo "======================================================"
        
        while true; do sleep 300; done
