name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Configure SSH for Direct Root Access
      run: |
        # Configure SSH for direct root login (no password needed)
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        
        # Restart SSH service
        sudo systemctl restart ssh
        echo "✅ SSH configured for root access"
        
    - name: Install Wush
      run: |
        wget -O wush.tar.gz https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_linux_amd64.tar.gz
        tar -xzf wush.tar.gz
        chmod +x wush
        sudo mv wush /usr/local/bin/
        rm wush.tar.gz
        echo "✅ Wush v0.4.1 installed"
        
    - name: Install ZSH Shell (Root User)
      run: |
        echo "======================================================"
        echo "         🔧 INSTALLING ZSH SHELL 🔧"
        echo "======================================================"
        
        # Clone and run the installation script
        git clone https://github.com/mugh33ra/install-ZSH-shell /tmp/zsh-install
        cd /tmp/zsh-install
        sudo bash install_shell.sh
        
        # Set ZSH as default shell for root
        sudo chsh -s /usr/bin/zsh root
        
        # Clean up
        cd /
        sudo rm -rf /tmp/zsh-install
        
        echo "✅ ZSH shell installed and set as default for root"
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        
        # Start wush and capture output
        wush serve :22 2>&1 | tee /tmp/wush_output.log &
        WUSH_PID=$!
        
        sleep 8
        
        # Extract auth key
        AUTH_KEY=$(grep -o '[a-zA-Z0-9]\{50,\}' /tmp/wush_output.log 2>/dev/null | head -1)
        
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ ! -z "$AUTH_KEY" ]; then
          echo "🔑 AUTHENTICATION KEY:"
          echo "$AUTH_KEY"
        else
          echo "📡 WUSH OUTPUT - AUTH KEY BELOW:"
          tail -n 15 /tmp/wush_output.log
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "======================================================"
        echo "🔗 CONNECTION COMMAND:"
        echo "   ./wush ssh"
        echo "======================================================"
        echo ""
        
        # Keep workflow alive
        while true; do
          sleep 30
        done
