name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Configure SSH for Direct Root Access
      run: |
        # Configure SSH for direct root login
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin yes/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        
        # Restart SSH service
        sudo systemctl restart ssh
        echo "✅ SSH configured for root access"
        
    - name: Install Wush
      run: |
        wget -O wush.tar.gz https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_linux_amd64.tar.gz
        tar -xzf wush.tar.gz
        chmod +x wush
        sudo mv wush /usr/local/bin/
        rm wush.tar.gz
        echo "✅ Wush v0.4.1 installed"
        
    - name: Install ZSH Shell (Root User)
      run: |
        echo "======================================================"
        echo "         🔧 INSTALLING ZSH SHELL 🔧"
        echo "======================================================"
        
        # Install ZSH and required packages
        sudo apt-get update -qq
        sudo apt-get install -y -qq zsh curl wgit git
        
        # Clone your custom installer
        git clone https://github.com/mugh33ra/install-ZSH-shell /tmp/zsh-install
        cd /tmp/zsh-install
        
        # Modify the install script to skip Oh My Zsh's zsh switch
        # Create a wrapper that runs without errors
        cat > /tmp/install_zsh_wrapper.sh << 'EOF'
#!/bin/bash
# Run the original installer but capture the Oh My Zsh error
bash install_shell.sh 2>&1 || true

# Force set ZSH as default shell for root
sudo chsh -s /usr/bin/zsh root

# Create minimal .zshrc if needed
if [ ! -f /root/.zshrc ]; then
    cat > /root/.zshrc << 'RC'
# ZSH Configuration
export ZSH="/root/.oh-my-zsh"
if [ -d "$ZSH" ]; then
    ZSH_THEME="robbyrussell"
    plugins=(git)
    source $ZSH/oh-my-zsh.sh
fi
RC
fi

echo "✅ ZSH installation completed"
EOF
        
        chmod +x /tmp/install_zsh_wrapper.sh
        sudo bash /tmp/install_zsh_wrapper.sh
        
        # Clean up
        cd /
        sudo rm -rf /tmp/zsh-install /tmp/install_zsh_wrapper.sh
        
        echo "✅ ZSH shell installed and set as default for root"
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        
        # Start wush and capture output
        wush serve :22 2>&1 | tee /tmp/wush_output.log &
        WUSH_PID=$!
        
        sleep 8
        
        # Extract auth key
        AUTH_KEY=$(grep -o '[a-zA-Z0-9]\{50,\}' /tmp/wush_output.log 2>/dev/null | head -1)
        
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        if [ ! -z "$AUTH_KEY" ]; then
          echo "🔑 AUTHENTICATION KEY:"
          echo "$AUTH_KEY"
        else
          echo "📡 WUSH OUTPUT - AUTH KEY BELOW:"
          tail -n 15 /tmp/wush_output.log
        fi
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "======================================================"
        echo "🔗 CONNECTION COMMAND:"
        echo "   ./wush ssh"
        echo "======================================================"
        echo ""
        echo "⏱️  Session will run for maximum 6 hours"
        echo ""
        
        # Keep workflow alive for 6 hours (21600 seconds)
        sleep 21600
