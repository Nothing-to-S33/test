name: BugHunter-Netbird
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install Netbird
      run: |
        curl -sSL https://pkgs.netbird.io/install.sh | sh
        
    - name: Connect to Netbird
      env:
        NETBIRD_SETUP_KEY: ${{ secrets.NETBIRD_SETUP_KEY }}  # Get from https://app.netbird.io
      run: |
        sudo netbird up --setup-key $NETBIRD_SETUP_KEY
        IP=$(ip addr show wt0 | grep inet | awk '{print $2}' | cut -d/ -f1)
        
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (Netbird) 🔥"
        echo "======================================================"
        echo ""
        echo "📡 Runner Netbird IP: $IP"
        echo ""
        echo "💻 On your local machine (after installing Netbird):"
        echo "ssh root@$IP"
        echo ""
        echo "🔑 Password: toor123"
        echo "======================================================"
        
        while true; do sleep 300; done
