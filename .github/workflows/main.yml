name: BugHunter-LocalhostRun
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Start localhost.run Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (localhost.run) 🔥"
        echo "======================================================"
        echo ""
        
        # Create SSH tunnel
        ssh -o StrictHostKeyChecking=no -R 80:localhost:22 ssh.localhost.run > tunnel.log 2>&1 &
        
        sleep 10
        
        # Extract URL
        URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.lhr\.life' tunnel.log | head -1)
        
        if [ ! -z "$URL" ]; then
          echo "✅ Tunnel URL: $URL"
          echo ""
          echo "📡 SSH Command:"
          echo "ssh -p 22 root@$(echo $URL | cut -d/ -f3) -o StrictHostKeyChecking=no"
          echo ""
          echo "🔑 Password: toor123"
        else
          echo "⚠️  Tunnel logs:"
          cat tunnel.log
        fi
        
        echo "======================================================"
        
        while true; do sleep 300; done
