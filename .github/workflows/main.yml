name: BugHunter-Wush
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Setup SSH
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install Wush
      run: |
        curl -fsSL https://github.com/coder/wush/raw/main/install.sh | sh
        
    - name: Start Wush Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH (WUSH) 🔥"
        echo "======================================================"
        echo ""
        echo "📡 Run this on YOUR local machine:"
        echo ""
        echo "1. Install wush: curl -fsSL https://github.com/coder/wush/raw/main/install.sh | sh"
        echo "2. Connect: wush ssh"
        echo "3. When prompted, paste this auth key:"
        echo ""
        # Generate and display auth key
        wush serve :22 &
        sleep 3
        echo "======================================================"
        echo "🔑 Password: toor123 (if asked)"
        echo "======================================================"
        
        while true; do sleep 300; done
