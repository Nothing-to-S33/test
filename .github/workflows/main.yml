- name: Start Cloudflare Tunnel
      run: |
        # Start tunnel
        cloudflared tunnel --url ssh://localhost:22 > cf.log 2>&1 &
        
        echo "Waiting for Cloudflare to generate your URL..."
        
        # Corrected loop syntax for GitHub Actions
        for i in {1..30}; do
          sleep 2
          if grep -q "trycloudflare.com" cf.log; then
            CF_URL=$(grep -o 'https://[-a-z0-9.]*trycloudflare.com' cf.log | head -n 1)
            echo "======================================================"
            echo "           CLOUDFLARE SSH ACCESS                      "
            echo "======================================================"
            echo "URL: $CF_URL"
            echo "======================================================"
            echo "PASSWORD: toor123"
            echo "======================================================"
            break
          fi
          
          if [ $i -eq 30 ]; then
            echo "❌ ERROR: Cloudflare failed to start. Log dump:"
            cat cf.log
            exit 1
          fi
        done
        
        # Keep alive
        while true; do sleep 300; done
