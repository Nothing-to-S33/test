name: BugHunter-SSH
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install Cloudflared & Setup SSH
      run: |
        sudo apt update
        sudo apt install -y wget openssh-server
        
        # Download and install cloudflared correctly
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
    - name: Configure SSH
      run: |
        # Set your password
        echo "root:toor123" | sudo chpasswd
        
        # Configure SSH for root login
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/ChallengeResponseAuthentication no/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd
        
    - name: Start Cloudflare Tunnel
      run: |
        # Clear any old logs
        rm -f cf.log
        
        # Start tunnel in background
        cloudflared tunnel --url ssh://localhost:22 > cf.log 2>&1 &
        
        echo "======================================================"
        echo "    🔥 BUG HUNTER SSH ACCESS (6 HOURS) 🔥"
        echo "======================================================"
        echo ""
        echo "⏳ Waiting for tunnel to establish (15 seconds)..."
        
        # Wait for tunnel to establish
        sleep 15
        
        # Extract and display the URL
        URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' cf.log | head -1)
        
        if [ ! -z "$URL" ]; then
          echo "✅ TUNNEL READY!"
          echo "══════════════════════════════════════════════════"
          echo "📡 YOUR CONNECTION DETAILS:"
          echo ""
          echo "   SSH Command for Windows Terminal:"
          echo "   ssh -o ProxyCommand=\"cloudflared access ssh --hostname $URL\" root@localhost"
          echo ""
          echo "   🔑 Password: toor123"
          echo ""
          echo "   🌐 Or if you prefer PuTTY:"
          echo "   Hostname: $URL"
          echo "   Port: 22"
          echo "   Username: root"
          echo "══════════════════════════════════════════════════"
        else
          echo "⚠️  URL not found, showing logs:"
          cat cf.log
        fi
        
        echo ""
        echo "⏱️  Session will expire in 6 hours"
        echo "📝 Keep this tab open - closing it stops the session"
        echo ""
        
        # Keep alive and show status every 5 minutes
        COUNTER=0
        while true; do
          sleep 300
          COUNTER=$((COUNTER + 5))
          echo "[$(date '+%H:%M:%S')] Session active for $COUNTER minutes - URL: ${URL:-check above}"
        done
