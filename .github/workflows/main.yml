name: BugHunter-SSH
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install SSH & Dependencies
      run: |
        sudo apt update && sudo apt install -y openssh-server sshpass
        
    - name: Configure Root Access
      run: |
        echo "root:toor123" | sudo chpasswd
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Start Pinggy Tunnel
      run: |
        echo "======================================================"
        echo "         🔥 BUG HUNTER SSH ACCESS 🔥"
        echo "======================================================"
        echo ""
        echo "📡 Starting Pinggy tunnel (better than Cloudflare for GH Actions)..."
        echo ""
        
        # Install sshpass and start tunnel
        ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:22 -o ServerAliveInterval=30 qr@a.pinggy.io > pinggy.log 2>&1 &
        
        sleep 5
        
        # Get URL from log
        URL=$(grep -o 'https://.*\.pinggy\.link' pinggy.log | head -1)
        
        if [ ! -z "$URL" ]; then
          echo "✅ Tunnel URL: $URL"
          echo ""
          echo "📡 SSH Command:"
          echo "ssh -p \$(echo $URL | cut -d: -f2 | cut -d/ -f3) root@localhost -o ProxyCommand=\"ssh -p 443 -W %h:%p qr@a.pinggy.io\""
          echo ""
          echo "🔑 Password: toor123"
        else
          echo "⚠️  Tunnel logs:"
          cat pinggy.log
        fi
        
        echo "======================================================"
        
        # Keep alive
        while true; do
          sleep 300
          echo "[$(date '+%H:%M:%S')] Session active"
        done
